<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>홀인원클럽 파크골프 등수 계산기</title>

<meta property="og:type" content="website">
<meta property="og:title" content="홀인원클럽 파크골프 등수 계산기">
<meta property="og:description" content="라운딩 스코어를 입력하고 전체 순위를 확인해보세요">
<meta property="og:image" content="https://park-golf.github.io/og-image.png">
<meta property="og:url" content="https://park-golf.github.io/">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --forest:#1B4332;
    --forest-2:#2D6A4F;
    --forest-3:#40916C;
    --cream:#F5F3EC;
    --white:#FFFFFF;
    --orange:#FF6B35;
    --orange-light:#FFE4D6;
    --ink:#16241A;
    --gray:#7C8B7E;
    --line:#E4E1D5;
    --gold:#F4B400;
    --silver:#B9C2C8;
    --bronze:#C9822F;
    --sumbg:#FFF3B0;
    --totalbg:#FFC469;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:var(--cream);
    display:flex;
    flex-direction:column;
    padding-bottom:96px;
  }
  .header{
    background:
      repeating-linear-gradient(135deg, var(--forest-2) 0px, var(--forest-2) 14px, var(--forest) 14px, var(--forest) 28px);
    color:#fff;
    padding:20px 20px 18px;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 4px 14px rgba(0,0,0,0.15);
  }
  .header .brand{
    font-size:13px;
    font-weight:700;
    opacity:0.8;
    margin-bottom:4px;
    letter-spacing:0.2px;
  }
  .header h1{
    margin:0;
    font-size:20px;
    font-weight:800;
    letter-spacing:-0.3px;
    line-height:1.3;
  }
  .header .sub{
    margin-top:4px;
    font-size:13px;
    font-weight:500;
    opacity:0.85;
  }
  .content{
    flex:1;
    padding:20px 18px 20px;
  }
  .card{
    background:var(--white);
    border-radius:18px;
    padding:20px 18px;
    box-shadow:0 2px 10px rgba(27,67,50,0.08);
    margin-bottom:16px;
  }
  .section-title{
    font-size:17px;
    font-weight:800;
    color:var(--forest);
    margin:0 0 14px;
  }
  input[type=date]{
    width:100%;
    height:58px;
    border-radius:14px;
    border:2px solid var(--line);
    background:var(--cream);
    padding:0 14px;
    font-size:19px;
    font-weight:700;
    font-family:inherit;
    color:var(--ink);
  }
  input[type=date]:focus{ outline:none; border-color:var(--forest-3); background:#fff; }
  .date-preview{
    text-align:center;
    margin-top:16px;
    font-size:22px;
    font-weight:800;
    color:var(--forest);
  }
  .big-stepper{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:10px 0 6px;
  }
  .big-stepper .stepper-btn{
    width:60px;height:60px;
    border-radius:16px;
    border:none;
    font-size:30px;
    font-weight:800;
    background:var(--cream);
    color:var(--forest);
  }
  .big-stepper .stepper-btn.minus{ color:var(--orange); }
  .big-stepper .val{
    min-width:110px;
    text-align:center;
    font-size:38px;
    font-weight:900;
    color:var(--ink);
  }
  .player-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }
  .player-badge{
    width:40px;height:40px;
    flex-shrink:0;
    border-radius:12px;
    background:var(--forest);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    font-size:15px;
  }
  .player-row input{
    flex:1;
    height:52px;
    border-radius:12px;
    border:2px solid var(--line);
    padding:0 14px;
    font-size:18px;
    font-weight:600;
    font-family:inherit;
    color:var(--ink);
    background:var(--cream);
  }
  .player-row input:focus{
    outline:none;
    border-color:var(--forest-3);
    background:#fff;
  }
  .hole-option{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 18px;
    border-radius:16px;
    border:2.5px solid var(--line);
    margin-bottom:14px;
    background:var(--white);
  }
  .hole-option.selected{
    border-color:var(--orange);
    background:var(--orange-light);
  }
  .hole-option .label{
    font-size:19px;
    font-weight:800;
    color:var(--forest);
  }
  .hole-option .desc{
    font-size:13px;
    color:var(--gray);
    font-weight:500;
    margin-top:2px;
  }
  .radio-dot{
    width:26px;height:26px;
    border-radius:50%;
    border:2.5px solid var(--line);
    flex-shrink:0;
    position:relative;
  }
  .hole-option.selected .radio-dot{
    border-color:var(--orange);
  }
  .hole-option.selected .radio-dot::after{
    content:'';
    position:absolute;
    inset:4px;
    border-radius:50%;
    background:var(--orange);
  }
  .progress-wrap{
    padding:0 18px;
    margin-top:14px;
  }
  .progress-track{
    height:8px;
    border-radius:6px;
    background:var(--line);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--orange);
    border-radius:6px;
    transition:width .25s ease;
  }
  .progress-label{
    text-align:center;
    font-size:13px;
    color:#fff;
    opacity:0.9;
    margin-top:8px;
    font-weight:600;
  }
  .hole-title{
    text-align:center;
    margin:6px 0 20px;
  }
  .hole-title .badge{
    display:inline-block;
    background:var(--forest);
    color:#fff;
    font-weight:800;
    font-size:26px;
    padding:10px 26px;
    border-radius:50px;
    letter-spacing:-0.5px;
  }
  .stepper-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--white);
    border-radius:16px;
    padding:14px 14px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(27,67,50,0.06);
  }
  .stepper-name{
    flex:1;
    font-size:17px;
    font-weight:700;
    color:var(--ink);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .stepper-btn{
    width:52px;height:52px;
    border-radius:14px;
    border:none;
    font-size:26px;
    font-weight:800;
    background:var(--cream);
    color:var(--forest);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .stepper-btn:active{ background:var(--forest); color:#fff; }
  .stepper-btn.minus{ color:var(--orange); }
  .stepper-value{
    width:52px;
    text-align:center;
    font-size:26px;
    font-weight:800;
    color:var(--ink);
    flex-shrink:0;
  }
  .navbar{
    position:fixed;
    bottom:0; left:0; right:0;
    max-width:520px;
    margin:0 auto;
    background:#fff;
    border-top:1px solid var(--line);
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
    z-index:30;
  }
  .btn{
    flex:1;
    height:56px;
    border-radius:14px;
    border:none;
    font-size:17px;
    font-weight:800;
    font-family:inherit;
    display:flex;align-items:center;justify-content:center;
    gap:6px;
  }
  .btn-primary{ background:var(--forest); color:#fff; }
  .btn-primary:active{ background:var(--forest-2); }
  .btn-secondary{ background:var(--cream); color:var(--forest); border:2px solid var(--line); }
  .btn-secondary:active{ background:var(--line); }
  .btn-orange{ background:var(--orange); color:#fff; }
  .btn-orange:active{ background:#e35a26; }
  .btn:disabled{ opacity:0.4; }
  .rank-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:6px;
  }
  .rank-item{
    display:flex;
    align-items:center;
    gap:14px;
    background:#fff;
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 2px 8px rgba(27,67,50,0.06);
  }
  .rank-item.first{ background:linear-gradient(90deg, #FFF7DE, #fff); border:2px solid var(--gold); }
  .rank-medal{
    width:44px;height:44px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:900;
    color:#fff;
    flex-shrink:0;
  }
  .rank-info{ flex:1; }
  .rank-info .name{ font-size:17px; font-weight:800; color:var(--ink); }
  .rank-info .score{ font-size:12.5px; color:var(--gray); font-weight:600; margin-top:2px;}
  .tie-reason{
    font-size:12px;
    color:var(--orange);
    font-weight:700;
    margin-top:3px;
  }
  .rank-total{ font-size:22px; font-weight:900; color:var(--forest); }
  .rank-total span{ font-size:12px; font-weight:600; color:var(--gray); }
  .tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:6px;
    margin-bottom:14px;
  }
  .tab-btn{
    flex-shrink:0;
    padding:10px 18px;
    border-radius:20px;
    border:2px solid var(--line);
    background:var(--white);
    color:var(--forest);
    font-size:15px;
    font-weight:700;
    white-space:nowrap;
  }
  .tab-btn.active{
    background:var(--forest);
    border-color:var(--forest);
    color:#fff;
  }
  .table-scroll{
    overflow-x:auto;
    border-radius:14px;
    border:1px solid var(--line);
  }
  table.score-table{
    border-collapse:collapse;
    width:100%;
    min-width:380px;
    font-size:14px;
  }
  table.score-table th, table.score-table td{
    border:1px solid var(--line);
    text-align:center;
    padding:9px 6px;
    white-space:nowrap;
  }
  table.score-table th{
    background:var(--forest);
    color:#fff;
    font-weight:700;
    font-size:13px;
  }
  table.score-table td.rowlabel{
    background:var(--cream);
    font-weight:700;
    color:var(--forest);
    text-align:left;
    padding-left:12px;
  }
  table.score-table tr.sumrow td{
    background:var(--sumbg);
    font-weight:800;
  }
  table.score-table tr.totalrow td{
    background:var(--totalbg);
    font-weight:900;
    font-size:15px;
  }
  .share-hint{
    text-align:center;
    font-size:12.5px;
    color:var(--gray);
    margin-top:10px;
    line-height:1.5;
  }
  .toast{
    position:fixed;
    bottom:100px; left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:#fff;
    padding:12px 20px;
    border-radius:30px;
    font-size:14px;
    font-weight:600;
    z-index:100;
    opacity:0;
    transition:opacity .25s ease;
    pointer-events:none;
    max-width:85%;
    text-align:center;
  }
  .toast.show{ opacity:0.95; }
  .empty-note{
    text-align:center;
    color:var(--gray);
    font-size:14px;
    padding:20px 0;
    font-weight:600;
  }
  .loading-wrap{
    text-align:center;
    padding:60px 20px;
    color:var(--forest);
    font-weight:700;
    font-size:16px;
  }
  .edit-overlay{
    position:fixed;
    inset:0;
    background:rgba(22,36,26,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
  }
  .edit-overlay.show{ display:flex; }
  .edit-modal{
    background:#fff;
    border-radius:20px;
    padding:26px 22px;
    width:100%;
    max-width:300px;
    text-align:center;
    box-shadow:0 12px 32px rgba(0,0,0,0.25);
  }
  .edit-title{
    font-size:16px;
    font-weight:800;
    color:var(--forest);
    margin-bottom:18px;
    line-height:1.4;
  }
  table.score-table td.editable-cell{
    color:var(--forest-2);
    font-weight:800;
    cursor:pointer;
  }
  table.score-table td.editable-cell:active{
    background:var(--orange-light);
  }
  table.score-table th.editable-name{
    cursor:pointer;
    text-decoration:underline;
    text-decoration-style:dotted;
    text-underline-offset:3px;
  }
  table.score-table th.editable-name:active{
    background:var(--forest-2);
  }
  .fab-wrap{
    position:fixed;
    left:0; right:0;
    bottom:88px;
    max-width:520px;
    margin:0 auto;
    pointer-events:none;
    z-index:40;
  }
  .fab-share{
    position:absolute;
    right:18px;
    bottom:0;
    width:60px; height:60px;
    border-radius:50%;
    background:var(--orange);
    color:#fff;
    border:none;
    font-size:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.28);
    pointer-events:auto;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .fab-share:active{ background:#e35a26; }
  .calendar-wrap{ width:100%; }
  .cal-toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    margin:0;
  }
  .cal-toggle-arrow{
    font-size:14px;
    color:var(--forest);
    font-weight:800;
    flex-shrink:0;
    margin-left:10px;
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .cal-nav{
    width:36px; height:36px;
    border-radius:10px;
    border:none;
    background:var(--cream);
    color:var(--forest);
    font-size:20px;
    font-weight:800;
  }
  .cal-month{
    font-size:15px;
    font-weight:800;
    color:var(--forest);
    cursor:pointer;
    text-decoration:underline;
    text-decoration-style:dotted;
    text-underline-offset:4px;
  }
  .cal-weekdays{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:11px;
    font-weight:700;
    color:var(--gray);
    margin-bottom:4px;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:3px;
  }
  .cal-cell{
    position:relative;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
    color:var(--ink);
  }
  .cal-cell:not(.empty){ cursor:pointer; }
  .cal-cell:not(.empty):active{ background:var(--cream); }
  .cal-cell.selected{ background:var(--forest); color:#fff; }
  .cal-dot{
    position:absolute;
    top:4px;
    right:6px;
    width:7px; height:7px;
    border-radius:50%;
    background:#FF3B30;
    box-shadow:0 0 0 2px var(--white);
  }
  .cal-cell.selected .cal-dot{ box-shadow:0 0 0 2px var(--forest); }
  .picker-title{
    font-size:17px;
    font-weight:800;
    color:var(--forest);
    text-align:center;
    margin-bottom:0;
  }
  .picker-title.clickable{
    cursor:pointer;
    text-decoration:underline;
    text-decoration-style:dotted;
    text-underline-offset:4px;
  }
  .picker-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:18px 0;
  }
  .pick-cell{
    position:relative;
    padding:16px 0;
    border-radius:12px;
    background:var(--cream);
    text-align:center;
    font-size:16px;
    font-weight:700;
    color:var(--ink);
    cursor:pointer;
  }
  .pick-cell:active{ background:var(--orange-light); }
  .pick-cell.selected{ background:var(--forest); color:#fff; }
  .pick-dot{
    position:absolute;
    top:5px;
    right:8px;
    width:7px; height:7px;
    border-radius:50%;
    background:#FF3B30;
    box-shadow:0 0 0 2px var(--white);
  }
  .pick-cell.selected .pick-dot{ box-shadow:0 0 0 2px var(--forest); }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="edit-overlay" id="editOverlay">

    <div style="display:flex; gap:10px; margin-top:20px;">

    <button class="btn btn-secondary" id="monthPickerCancel" style="width:100%;">닫기</button>

</div>

      <div class="picker-title" id="yearPickerLabel"></div>
      <button class="cal-nav" id="yearPickerNext">›</button>

    <div class="picker-grid" id="yearPickerGrid"></div>
    <button class="btn btn-secondary" id="yearPickerCancel" style="width:100%;">닫기</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, doc, setDoc, getDocs, query, where
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCojF51Fs-e9Ww2oXgYh3TFqOMMesJZY5M",
    authDomain: "park-golf-89995.firebaseapp.com",
    projectId: "park-golf-89995",
    storageBucket: "park-golf-89995.firebasestorage.app",
    messagingSenderId: "64229553513",
    appId: "1:64229553513:web:5897faf32381aa167779f8",
    measurementId: "G-VZB8Q2YD3E"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COL = 'pg_groups';

  window.__fbSaveGroup = async function(record){
    const id = `${record.date}_group${record.groupNum}`;
    await setDoc(doc(db, COL, id), record);
  };

  window.__fbLoadGroups = async function(dateStr){
    const q = query(collection(db, COL), where('date', '==', dateStr));
    const snap = await getDocs(q);
    const list = [];
    snap.forEach(d => list.push(d.data()));
    list.sort((a,b) => a.groupNum - b.groupNum);
    return list;
  };

  window.__fbLoadAllDates = async function(){
    const snap = await getDocs(collection(db, COL));
    const set = new Set();
    snap.forEach(d=>{
      const data = d.data();
      if(data && data.date) set.add(data.date);
    });
    return Array.from(set);
  };

  window.__fbReady = true;
  window.dispatchEvent(new Event('fb-ready'));
</script>

<script>
const SECTION_LABELS = { 18:['A','B'], 27:['A','B','C'], 36:['A','B','C','D'] };
const HOLE_OPTIONS = [

function aggregateRanking(records){
  const map = {};
  records.forEach(rec=>{
    const secs = SECTION_LABELS[rec.holeType];
    const lastSec = secs[secs.length-1];
    rec.players.forEach((name, i)=>{
      const total = secs.reduce((sum,s)=> sum + rec.scores[s].reduce((a,h)=>a+h[i],0), 0);
      const lastTotal = rec.scores[lastSec].reduce((a,h)=>a+h[i],0);
      const lastHoles = rec.scores[lastSec].map(h=>h[i]); // 1홀~9홀 순서
      if(!map[name]){
        map[name] = { name, total:0, rounds:0, groups:[], lastTotal:0, lastHoles:new Array(9).fill(0) };
      }
      map[name].total += total;
      map[name].lastTotal += lastTotal;
      for(let h=0; h<9; h++) map[name].lastHoles[h] += lastHoles[h];
      map[name].rounds += 1;
      map[name].groups.push(`${rec.groupNum}조 ${total}타`);
    });
  });
  let list = Object.values(map);
  list.sort((a,b)=>{
    if(a.total !== b.total) return a.total - b.total;
    if(a.lastTotal !== b.lastTotal) return a.lastTotal - b.lastTotal;
    for(let h=8; h>=0; h--){
      if(a.lastHoles[h] !== b.lastHoles[h]) return a.lastHoles[h] - b.lastHoles[h];
    }
    return 0;
  });
  let ranks = [];
  list.forEach((p,i)=>{
    if(i>0 && aggregateTieEqual(list[i-1],p)) ranks.push(ranks[i-1]);
    else ranks.push(i+1);
  });
  return list.map((p,i)=>({...p, rank: ranks[i]}));
}
function aggregateTieEqual(a,b){
  if(a.total !== b.total) return false;
  if(a.lastTotal !== b.lastTotal) return false;
  for(let h=8; h>=0; h--){ if(a.lastHoles[h] !== b.lastHoles[h]) return false; }
  return true;
}

// 총 타수가 같은 선수들 사이에서, 순위가 갈린 결정적 기준을 끝까지 재귀적으로 찾아서
// "B합계 37타" 또는 "B합계 37타 / B9홀 4타 / B8홀 5타" 같은 문구로 반환.
// 3명 이상이 여러 단계에 걸쳐 동률인 경우에도 최종적으로 갈리는 지점까지 전부 표시한다.
function computeTieAnnotations(list){
  const label = lastSectionLabel();
  const CRITERIA = [{ label: `${label}합계`, accessor: p=>p.lastTotal }];
  for(let h=8; h>=0; h--){
    CRITERIA.push({ label: `${label}${h+1}홀`, accessor: p=>p.lastHoles[h] });
  }
  const ann = {};

  function recurse(indices, stack, critIdx){
    if(indices.length <= 1) return;
    if(critIdx >= CRITERIA.length) return; // 모든 기준까지 완전 동률 -> 공동순위 처리
    const { label: critLabel, accessor } = CRITERIA[critIdx];
    const buckets = new Map();
    indices.forEach(idx=>{
      const val = accessor(list[idx]);
      if(!buckets.has(val)) buckets.set(val, []);
      buckets.get(val).push(idx);
    });
    buckets.forEach((bucketIndices, val)=>{
      if(bucketIndices.length === 1){
        const finalStack = [...stack, `${critLabel} ${val}타`];
        ann[bucketIndices[0]] = finalStack.join(' / ');
      } else {
        recurse(bucketIndices, [...stack, `${critLabel} ${val}타`], critIdx+1);
      }
    });
  }

  let i = 0;
  while(i < list.length){
    let j = i;
    while(j+1 < list.length && list[j+1].total === list[i].total) j++;
    if(j > i){
      const indices = [];
      for(let k=i; k<=j; k++) indices.push(k);
      recurse(indices, [], 0);
    }
    i = j+1;
  }
  return ann;
}

function buildShareText(){
  let text = `⛳ ${formatDateTitle()}\n\n`;
  const medals = {1:'🥇',2:'🥈',3:'🥉'};
  if(state.aggregated.length===0){
    text += '아직 등록된 스코어가 없습니다.\n';
  } else {
    const tieAnn = computeTieAnnotations(state.aggregated);
    state.aggregated.forEach((p, idx)=>{
      const medal = medals[p.rank] || `${p.rank}등`;
      const tie = (state.aggregated.filter(x=>x.rank===p.rank).length>1) ? '(공동)' : '';
      text += `${medal}${tie} ${p.name} - ${p.total}타\n`;
      if(tieAnn[idx]) text += `   (${tieAnn[idx]})\n`;
    });
  }
  text += `\n[조별 참여 현황]\n`;
  state.groupsData.forEach(rec=>{
    text += `${rec.groupNum}조: ${rec.players.join(', ')} (${rec.holeType}홀)\n`;
  });
  return text;
}

  try{
    await navigator.clipboard.writeText(text);

  `;
}

function renderStepGroup(){
  const takenText = state.takenGroups.length
    ? `<div style="text-align:center; color:var(--gray); font-size:13px; font-weight:600; margin-top:12px;">이미 등록됨: ${state.takenGroups.map(n=>n+'조').join(', ')} (선택 불가)</div>`
    : '';
  return `
    ${renderHeader('몇 번째 조인가요?', `${formatDateShort()} 라운딩`)}
    <div class="content">
      <div class="card">
        <div class="section-title">🔢 조 번호</div>
        <div class="big-stepper">
          <button class="stepper-btn minus" id="grpMinus">−</button>
          <div class="val" id="grpVal">${state.groupNum}조</div>
          <button class="stepper-btn" id="grpPlus">+</button>
        </div>
        ${takenText}
      </div>
    </div>
    <div class="navbar">
      <button class="btn btn-secondary" id="back1">이전</button>
      <button class="btn btn-primary" id="toStep3">다음</button>
    </div>
  `;
}

function renderStepCount(){
  return `
    ${renderHeader('인원수를 선택해주세요', `${formatDateShort()} · ${state.groupNum}조`)}
    <div class="content">
      <div class="card">
        <div class="section-title">👥 플레이어 인원</div>
        <div class="hole-option ${state.numPlayers===3?'selected':''}" data-v="3">
          <div><div class="label">3명</div><div class="desc">플레이어 3명 참여</div></div>
          <div class="radio-dot"></div>
        </div>
        <div class="hole-option ${state.numPlayers===4?'selected':''}" data-v="4">
          <div><div class="label">4명</div><div class="desc">플레이어 4명 참여</div></div>
          <div class="radio-dot"></div>
        </div>
      </div>
    </div>
    <div class="navbar">
      <button class="btn btn-secondary" id="back2">이전</button>
      <button class="btn btn-primary" id="toStep4">다음</button>
    </div>
  `;
}

function renderStepNames(){
  let rows = '';
  for(let i=0;i<state.numPlayers;i++){
    rows += `
    <div class="player-row">
      <div class="player-badge">P${i+1}</div>
      <input type="text" data-idx="${i}" class="name-input" placeholder="${defaultName(i)}" value="${state.players[i] || ''}" maxlength="8">
    </div>`;
  }
  return `
    ${renderHeader('플레이어 이름을 입력해주세요', `${formatDateShort()} · ${state.groupNum}조 · ${state.numPlayers}명`)}
    <div class="content">
      <div class="card">
        <div class="section-title">👤 플레이어 이름</div>
        ${rows}
      </div>
    </div>
    <div class="navbar">
      <button class="btn btn-secondary" id="back3">이전</button>
      <button class="btn btn-primary" id="toStep5">다음</button>
    </div>
  `;
}

function renderStepHoleType(){
  let opts = HOLE_OPTIONS.map(o=>`
    <div class="hole-option ${state.holeType===o.v?'selected':''}" data-v="${o.v}">
      <div><div class="label">${o.v}홀</div><div class="desc">${o.desc}</div></div>
      <div class="radio-dot"></div>
    </div>`).join('');
  return `
    ${renderHeader('홀 수를 선택해주세요', `${formatDateShort()} · ${state.groupNum}조`)}
    <div class="content">
      <div class="card">
        <div class="section-title">🏌️ 홀 수 선택</div>
        ${opts}
      </div>
    </div>
    <div class="navbar">
      <button class="btn btn-secondary" id="back4">이전</button>
      <button class="btn btn-primary" id="toStep6">스코어 입력 시작</button>
    </div>
  `;
}

function renderStepEntry(){
  const {section, hIdx} = flatToSectionHole(state.cur);
  const holeNum = hIdx+1;
  const total = totalHoles();
  const pct = Math.round(((state.cur+1)/total)*100);
  let rows = '';
  for(let i=0;i<state.numPlayers;i++){
    rows += `
    <div class="stepper-row">
      <div class="stepper-name">${playerName(i)}</div>
      <button class="stepper-btn minus" data-p="${i}" data-d="-1">−</button>
      <div class="stepper-value" id="val-${i}">${state.scores[section][hIdx][i]}</div>
      <button class="stepper-btn plus" data-p="${i}" data-d="1">+</button>
    </div>`;
  }
  const isFirst = state.cur === 0;
  const isLast = state.cur === total-1;
  return `
    <div class="header">
      <div class="brand">⛳ ${state.groupNum}조 · ${formatDateShort()}</div>
      <h1>스코어 입력</h1>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-label">${state.cur+1} / ${total} 홀</div>
      </div>
    </div>
    <div class="content">
      <div class="hole-title"><span class="badge">${section} ${holeNum}홀</span></div>
      ${rows}
    </div>
    <div class="navbar">
      <button class="btn btn-secondary" id="prevHole">${isFirst? '홀수 다시선택' : '이전 홀'}</button>
      <button class="btn btn-orange" id="nextHole">${isLast? '결과 보기' : '다음 홀'}</button>
    </div>
  `;
}

function renderStepResults(){
  if(state.resultsLoading){
    return `
      ${renderHeader('결과를 불러오는 중이에요...')}
      <div class="content"><div class="loading-wrap">⛳ 잠시만 기다려주세요...</div></div>
    `;
  }
  const medalColor = {1:'var(--gold)',2:'var(--silver)',3:'var(--bronze)'};
  let rankHtml = '';
  if(state.aggregated.length===0){
    rankHtml = `<div class="empty-note">데이터를 불러오지 못했어요. 새로고침을 눌러주세요.</div>`;
  } else {
    const tieAnn = computeTieAnnotations(state.aggregated);
    rankHtml = state.aggregated.map((p, idx)=>{
      const tie = state.aggregated.filter(x=>x.rank===p.rank).length>1;
      const medalIcon = {1:'🥇',2:'🥈',3:'🥉'}[p.rank] || p.rank;
      const reasonLine = tieAnn[idx] ? `<div class="tie-reason">(${tieAnn[idx]})</div>` : '';
      return `
      <div class="rank-item ${p.rank===1?'first':''}">
        <div class="rank-medal" style="background:${medalColor[p.rank]||'#9AA79C'}">${medalIcon}</div>
        <div class="rank-info">
          <div class="name">${tie?'공동 ':''}${p.rank}등 · ${p.name}</div>
          <div class="score">${p.groups.join(' · ')}</div>
          ${reasonLine}
        </div>
        <div class="rank-total">${p.total}<span>타</span></div>
      </div>`;
    }).join('');
  }

  let tabsHtml = '';
  let tableHtml = '';
  if(state.groupsData.length){
    tabsHtml = `<div class="tabs">${state.groupsData.map(rec=>`
      <button class="tab-btn ${state.activeTab===rec.groupNum?'active':''}" data-tab="${rec.groupNum}">${rec.groupNum}조</button>
    `).join('')}</div>`;
    const activeRec = state.groupsData.find(r=>r.groupNum===state.activeTab) || state.groupsData[0];
    tableHtml = renderGroupTable(activeRec);
  } else {
    tableHtml = `<div class="empty-note">표시할 조별 데이터가 없어요.</div>`;
  }

  return `
    ${renderHeader(formatDateTitle())}
    <div class="content">
      <div class="card">
        <div class="section-title">🏆 전체 순위 (전 조 합산)</div>
        <div class="rank-list">${rankHtml}</div>
        <button class="btn btn-secondary" id="refreshBtn" style="width:100%; height:46px; font-size:15px;">🔄 최신 데이터 새로고침</button>
      </div>
      <div class="card">
        <div class="section-title">📋 조별 상세 스코어표</div>
        ${tabsHtml}
        ${tableHtml}
        <div class="share-hint">표의 타수 숫자를 누르면 바로 수정할 수 있어요 · 같은 날짜로 다른 조가 입력하면 순위가 자동으로 합산돼요</div>
      </div>
    </div>
    <div class="fab-wrap"><button class="fab-share" id="shareBtn" title="결과 복사하기">📋</button></div>
    <div class="navbar">
      <button class="btn btn-secondary" id="goHome">🏠 처음 화면</button>
      <button class="btn btn-primary" id="addGroup">다른 조 입력</button>
    </div>
  `;
}

function attachHandlers(){
  const toStep2 = document.getElementById('toStep2');
  if(toStep2){
    const calPrev = document.getElementById('calPrev');
    if(calPrev){
      calPrev.addEventListener('click', ()=>{
        state.calendarMonth--;
        if(state.calendarMonth < 0){ state.calendarMonth = 11; state.calendarYear--; }
        render();
      });
    }
    const calNext = document.getElementById('calNext');
    if(calNext){
      calNext.addEventListener('click', ()=>{
        state.calendarMonth++;
        if(state.calendarMonth > 11){ state.calendarMonth = 0; state.calendarYear++; }
        render();
      });
    }
    const calMonthLabel = document.getElementById('calMonthLabel');
    if(calMonthLabel){
      calMonthLabel.addEventListener('click', ()=> openMonthPicker(state.calendarYear));
    }
    document.querySelectorAll('.cal-cell[data-date]').forEach(cell=>{
      cell.addEventListener('click', ()=>{
        state.date = cell.dataset.date;
        const [yy,mm] = cell.dataset.date.split('-');
        state.calendarYear = parseInt(yy,10);
        state.calendarMonth = parseInt(mm,10)-1;
        render();
      });
    });
    toStep2.addEventListener('click', async ()=>{
      toStep2.disabled = true;
      toStep2.textContent = '확인 중...';
      const existing = await loadAllGroupsForDate(state.date);
      state.takenGroups = existing.map(r=>r.groupNum);
      state.groupNum = nextAvailableGroupNum(state.takenGroups, 1);
      goStep(2);
    });
    const viewResultsBtn = document.getElementById('viewResultsBtn');
    if(viewResultsBtn){
      viewResultsBtn.addEventListener('click', async ()=>{
        viewResultsBtn.disabled = true;
        viewResultsBtn.textContent = '불러오는 중...';
        state.activeTab = null;
        state.step = 7;
        state.resultsLoading = true;
        render();
        await refreshResults(true);
        window.scrollTo(0,0);
      });
    }
  }
  const toStep3 = document.getElementById('toStep3');
  if(toStep3){
    document.getElementById('grpMinus').addEventListener('click', ()=>{
      let n = state.groupNum - 1;
      while(n>=1 && state.takenGroups.includes(n)) n--;
      if(n>=1) state.groupNum = n;
      render();
    });
    document.getElementById('grpPlus').addEventListener('click', ()=>{
      state.groupNum = nextAvailableGroupNum(state.takenGroups, state.groupNum+1);
      render();
    });
    document.getElementById('back1').addEventListener('click', ()=> goStep(1));
    toStep3.addEventListener('click', ()=>{
      if(state.takenGroups.includes(state.groupNum)){
        showToast('이미 등록된 조 번호예요. 다른 번호를 선택해주세요.');
        return;
      }
      goStep(3);
    });
  }
  const toStep4 = document.getElementById('toStep4');
  if(toStep4){
    document.querySelectorAll('.hole-option').forEach(el=>{
      el.addEventListener('click', ()=>{
        const v = +el.dataset.v;
        state.numPlayers = v;
        const arr = new Array(v).fill('');
        for(let i=0;i<v;i++) arr[i] = state.players[i] || '';
        state.players = arr;
        render();
      });
    });
    document.getElementById('back2').addEventListener('click', ()=> goStep(2));
    toStep4.addEventListener('click', ()=> goStep(4));
  }
  const toStep5 = document.getElementById('toStep5');
  if(toStep5){
    document.querySelectorAll('.name-input').forEach(inp=>{
      inp.addEventListener('input', e=>{
        state.players[+e.target.dataset.idx] = e.target.value;
      });
    });
    document.getElementById('back3').addEventListener('click', ()=> goStep(3));
    toStep5.addEventListener('click', async ()=>{
      toStep5.disabled = true;
      toStep5.textContent = '확인 중...';
      const existing = await loadAllGroupsForDate(state.date);
      if(existing.length > 0){
        state.holeType = existing[0].holeType;
        showToast(`같은 날짜에 등록된 ${state.holeType}홀로 자동 설정됐어요`);
        initScores();
        state.cur = 0;
        goStep(6);
      } else {
        goStep(5);
      }
    });
  }
  const toStep6 = document.getElementById('toStep6');
  if(toStep6){
    document.querySelectorAll('.hole-option').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.holeType = +el.dataset.v;
        render();
      });
    });
    document.getElementById('back4').addEventListener('click', ()=> goStep(4));
    toStep6.addEventListener('click', ()=>{
      initScores();
      state.cur = 0;
      goStep(6);
    });
  }
  const nextHole = document.getElementById('nextHole');
  if(nextHole){
    document.querySelectorAll('.stepper-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const p = +btn.dataset.p;
        const d = +btn.dataset.d;
        const {section, hIdx} = flatToSectionHole(state.cur);
        let v = state.scores[section][hIdx][p] + d;
        if(v < 1) v = 1;
        if(v > 15) v = 15;
        state.scores[section][hIdx][p] = v;
        document.getElementById('val-'+p).textContent = v;
      });
    });
    document.getElementById('prevHole').addEventListener('click', ()=>{
      if(state.cur === 0) goStep(5);
      else { state.cur -= 1; render(); }
    });
    nextHole.addEventListener('click', async ()=>{
      if(state.cur === totalHoles()-1){
        nextHole.disabled = true;
        nextHole.textContent = '저장 중...';
        await goToResults();
      } else {
        state.cur += 1; render();
      }
    });
  }
  const shareBtn = document.getElementById('shareBtn');
  if(shareBtn){
    shareBtn.addEventListener('click', shareResult);
    const goHome = document.getElementById('goHome');
    if(goHome){
      goHome.addEventListener('click', ()=> goStep(1));
    }
    const refreshBtn = document.getElementById('refreshBtn');
    if(refreshBtn){
      refreshBtn.addEventListener('click', async ()=>{
        refreshBtn.disabled = true;
        refreshBtn.textContent = '불러오는 중...';
        await refreshResults();
      });
    }
    document.getElementById('addGroup').addEventListener('click', ()=>{
      state.takenGroups = state.groupsData.map(r=>r.groupNum);
      state.groupNum = nextAvailableGroupNum(state.takenGroups, 1);
      state.numPlayers = 4;
      state.players = ['','','',''];
      state.holeType = 18;
      state.scores = {};
      state.cur = 0;
      goStep(2);
    });
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.activeTab = +btn.dataset.tab;
        render();
      });
    });
    document.querySelectorAll('.editable-cell').forEach(td=>{
      td.addEventListener('click', ()=>{
        openEditCell(+td.dataset.group, td.dataset.section, +td.dataset.hole, +td.dataset.p);
      });
    });
    document.querySelectorAll('.editable-name').forEach(th=>{
      th.addEventListener('click', ()=>{
        openEditName(+th.dataset.group, +th.dataset.p);
      });
    });
  }
}

bindEditModal();
bindEditNameModal();
bindPickerModals();
render();
refreshDatesWithData();
</script>
</body>
</html>
